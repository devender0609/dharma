<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7C2F;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Background gradient -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Subtle pattern circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="400" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="400" cy="250" r="180" fill="rgba(255,255,255,0.02)"/>
  <!-- City icon (large, centered, slightly faded) -->
  <text x="400" y="240" font-size="120" text-anchor="middle" dominant-baseline="middle" opacity="0.6">🌳</text>
  <!-- City name -->
  <text x="400" y="360" font-size="36" font-family="system-ui,sans-serif" font-weight="bold" text-anchor="middle" fill="rgba(255,255,255,0.9)">Bengaluru</text>
  <!-- Subtle bottom vignette -->
  <rect y="400" width="800" height="100" fill="rgba(0,0,0,0.3)"/>
</svg>