<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- origin-when-cross-origin: sends our origin to YouTube for embed auth; hides full path for privacy -->
    <meta name="referrer" content="origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Viewport — mobile-first, no zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#FF6B2C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vedatime" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO -->
    <title>Vedatime — Hindu Panchang, Festivals & AI Spiritual Guide</title>
    <meta name="description" content="Vedatime — intelligent Hindu calendar with live Panchang, festival tracking, AI spiritual guidance, mantras, and daily rituals." />
    <meta name="keywords" content="panchang, hindu calendar, tithi, nakshatra, festivals, diwali, AI assistant, vedic, muhurat, vedatime" />
    <meta name="author" content="Vedatime" />

    <!-- Open Graph -->
    <meta property="og:title" content="Vedatime" />
    <meta property="og:description" content="Vedatime — your intelligent Hindu calendar: Panchang, festivals, AI spiritual guidance." />
    <meta property="og:site_name" content="Vedatime" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vedatime" />
    <meta name="twitter:description" content="Vedatime · Panchang · Festivals · AI" />

    <!-- Splash screen color for iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <style>
      /* Minimal pre-React shell. Full design system lives in main.jsx */
      html, body { height: 100%; background: #0A0A18; margin: 0; }
      /* Mobile safety: guarantee no horizontal scroll and no content clipping the viewport */
      html, body { overflow-x: hidden; max-width: 100vw; }
      #root { height: 100%; overflow-x: hidden; }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Prevent long unbroken strings (urls, mantras) from forcing horizontal scroll */
      img, video, iframe { max-width: 100%; height: auto; }
      /* Smoother tap highlight on mobile */
      * { -webkit-tap-highlight-color: rgba(255, 107, 44, 0.15); }
      /* Respect OS reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- ResponsiveVoice — genuine Indian Hindi Female TTS (no OS voice install needed) -->
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
  </body>
</html>
